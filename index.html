<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷雷生日快樂！🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff6eb4;
    --lavender: #c9a6e8;
    --kuromi-purple: #7b5ea7;
    --kuromi-dark: #3d2466;
    --chiikawa-cream: #fff5e1;
    --chiikawa-yellow: #ffd966;
    --chiikawa-orange: #ffb347;
    --white: #ffffff;
    --soft-pink: #ffe4f0;
  }

  body {
    background: linear-gradient(135deg, #ffe4f0 0%, #f0e6ff 50%, #ffe4f0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
  }

  /* Floating decorations */
  .bg-deco {
    position: fixed;
    pointer-events: none;
    font-size: 2rem;
    animation: floatDeco linear infinite;
    opacity: 0.35;
    z-index: 0;
  }

  @keyframes floatDeco {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.35; }
    90% { opacity: 0.35; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 32px;
    max-width: 560px;
    width: 95%;
    margin: 24px auto;
    box-shadow:
      0 0 0 4px var(--pink),
      0 0 0 8px var(--lavender),
      0 20px 60px rgba(201,166,232,0.4);
    overflow: hidden;
    animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes cardPop {
    from { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Header */
  .card-header {
    background: linear-gradient(135deg, var(--kuromi-dark) 0%, var(--kuromi-purple) 60%, #b07fd4 100%);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px; right: -30px;
    height: 80px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
  }

  .stars-row {
    font-size: 1.1rem;
    margin-bottom: 8px;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-title {
    font-family: 'Pacifico', cursive;
    font-size: 2.4rem;
    color: var(--chiikawa-yellow);
    text-shadow: 3px 3px 0 var(--kuromi-dark), 0 0 20px rgba(255,217,102,0.5);
    line-height: 1.1;
    animation: titleBounce 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  @keyframes titleBounce {
    from { transform: translateY(-30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .header-subtitle {
    color: #e8c8ff;
    font-size: 1rem;
    margin-top: 6px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  /* Kuromi bow decoration */
  .bow-deco {
    font-size: 2.5rem;
    display: block;
    margin-top: 8px;
    animation: bowWiggle 2s ease-in-out infinite;
  }

  @keyframes bowWiggle {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.1); }
  }

  /* Photo section */
  .photos-section {
    background: var(--soft-pink);
    padding: 20px;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .photo-frame {
    flex: 1;
    border-radius: 20px;
    overflow: hidden;
    border: 4px solid white;
    box-shadow: 0 4px 16px rgba(201,166,232,0.4);
    position: relative;
    animation: photoSlide 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .photo-frame:first-child { animation-delay: 0.4s; }
  .photo-frame:last-child { animation-delay: 0.55s; }

  @keyframes photoSlide {
    from { transform: translateY(30px) scale(0.8); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .photo-frame img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .photo-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(123,94,167,0.85));
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    padding: 18px 6px 6px;
    letter-spacing: 1px;
  }

  /* Chiikawa deco strip */
  .deco-strip {
    background: var(--chiikawa-yellow);
    padding: 10px 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 1.5rem;
  }

  .deco-icon {
    display: inline-block;
    animation: iconHop 1.5s ease-in-out infinite;
  }
  .deco-icon:nth-child(1) { animation-delay: 0s; }
  .deco-icon:nth-child(2) { animation-delay: 0.2s; }
  .deco-icon:nth-child(3) { animation-delay: 0.4s; }
  .deco-icon:nth-child(4) { animation-delay: 0.6s; }
  .deco-icon:nth-child(5) { animation-delay: 0.8s; }
  .deco-icon:nth-child(6) { animation-delay: 1.0s; }
  .deco-icon:nth-child(7) { animation-delay: 1.2s; }

  @keyframes iconHop {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Message section */
  .message-section {
    padding: 24px 28px;
    background: white;
  }

  .message-name {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--kuromi-purple);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wish-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
    animation: wishPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .wish-item:nth-child(2) { animation-delay: 0.6s; }
  .wish-item:nth-child(3) { animation-delay: 0.75s; }
  .wish-item:nth-child(4) { animation-delay: 0.9s; }
  .wish-item:nth-child(5) { animation-delay: 1.05s; }

  @keyframes wishPop {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .wish-item.pink { background: #fff0f8; color: #c2185b; }
  .wish-item.purple { background: #f3eeff; color: var(--kuromi-dark); }
  .wish-item.yellow { background: #fffbe6; color: #8a6000; }
  .wish-item.green { background: #f0fff4; color: #276749; }

  .wish-emoji {
    font-size: 1.4rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Footer */
  .card-footer {
    background: linear-gradient(135deg, var(--kuromi-dark), var(--kuromi-purple));
    padding: 18px 24px;
    text-align: center;
  }

  .footer-msg {
    color: #e8c8ff;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .footer-hearts {
    font-size: 1.3rem;
    margin-top: 6px;
    animation: heartPulse 1.2s ease-in-out infinite;
  }

  @keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Kuromi SVG character - decorative */
  .char-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 4px 0 8px;
    background: var(--soft-pink);
  }

  .char-bubble {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--lavender);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    box-shadow: 0 4px 10px rgba(201,166,232,0.3);
    animation: charBounce 2s ease-in-out infinite;
  }
  .char-bubble:nth-child(2) { animation-delay: 0.3s; }
  .char-bubble:nth-child(3) { animation-delay: 0.6s; }

  @keyframes charBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
</style>
</head>
<body>

<!-- Floating background decorations -->
<script>
  const decos = ['🌸','⭐','✨','🎀','💜','🌟','🍭','🎂','💫','🎊'];
  decos.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'bg-deco';
    el.textContent = d;
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.animationDuration = (8 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 8) + 's';
    el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    document.body.appendChild(el);
  });
</script>
